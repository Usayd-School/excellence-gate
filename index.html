<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التميز 2.0 - مدرسة أسيد بن حضير</title>
    <!-- دعم الجوال PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0369a1; --success: #059669; --warning: #d97706; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: #1e293b; transition: 0.3s; }
        
        /* الهيدر المطور */
        header { background: linear-gradient(135deg, #0369a1, #075985); color: white; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid #fbbf24; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* لوحة الرسوم البيانية */
        .analytics-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 40px; }
        .chart-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* شريط البحث */
        .search-box { width: 100%; padding: 15px 25px; border-radius: 15px; border: 2px solid #e2e8f0; margin-bottom: 25px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(3,105,161,0.1); }

        .domain-card { background: white; border-radius: 25px; padding: 30px; margin-bottom: 30px; border-right: 8px solid var(--primary); }
        .kpi-row { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; margin-top: 15px; padding: 15px; transition: 0.2s; }
        .kpi-row:hover { background: #fff; transform: translateY(-2px); }

        .btn { padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-add { background: #fbbf24; color: #78350f; }
        .btn-main { background: var(--primary); color: white; }
        
        .task-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px; border-radius: 12px; margin-top: 8px; border: 1px solid #cbd5e1; }
        .task-text { flex: 1; cursor: pointer; padding: 0 10px; }
        .completed { text-decoration: line-through; color: #94a3b8; }
        
        .action-btns i { cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .fa-trash-alt:hover { color: var(--danger); }
        .fa-edit:hover { color: var(--warning); }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size:1.8rem; font-weight:900">بوابة التميز 2.0</h1>
        <small><i class="fas fa-school"></i> مدرسة أسيد بن حضير - لوحة التحكم الذكية</small>
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn btn-add" onclick="addDomain()"><i class="fas fa-plus"></i> مجال جديد</button>
        <button class="btn btn-main" onclick="window.print()"><i class="fas fa-file-pdf"></i> تصدير تقرير</button>
    </div>
</header>

<div class="container">
    <!-- الرسوم البيانية -->
    <div class="analytics-grid">
        <div class="chart-card">
            <h3 style="margin-top:0">نسبة الإنجاز العام</h3>
            <canvas id="mainChart"></canvas>
        </div>
        <div class="chart-card">
            <h3 style="margin-top:0">إحصائيات المهام</h3>
            <div id="statsBoxes" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-top:40px; text-align:center">
                <!-- تعبأ برمجياً -->
            </div>
        </div>
    </div>

    <!-- البحث -->
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن مجال، مؤشر، أو خطة عمل..." oninput="render()">

    <div id="app"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuD5HW9lusc4RuaHuVeiHC5YP4KMO5klo",
        authDomain: "excellencegate-99f89.firebaseapp.com",
        projectId: "excellencegate-99f89",
        storageBucket: "excellencegate-99f89.firebasestorage.app",
        messagingSenderId: "1031127698735",
        appId: "1:1031127698735:web:04976917d5017d2b2265da",
        databaseURL: "https://excellencegate-99f89-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'school_data');

    let state = { domains: [] };
    let myChart = null;

    onValue(dbRef, (snap) => {
        if (snap.val()) {
            state = snap.val();
            render();
            updateCharts();
        }
    });

    const save = () => set(dbRef, state);

    // --- وظائف التحكم ---
    window.addDomain = () => {
        const title = prompt("اسم المجال الجديد:");
        if (title) { state.domains.push({ title, kpis: [] }); save(); }
    };

    window.addKPI = (dIdx) => {
        const name = prompt("اسم المؤشر:");
        if (name) { state.domains[dIdx].kpis.push({ name, tasks: [] }); save(); }
    };

    window.addTask = (dIdx, kIdx) => {
        const text = prompt("أدخل المهمة/الخطة:");
        if (text) { 
            if (!state.domains[dIdx].kpis[kIdx].tasks) state.domains[dIdx].kpis[kIdx].tasks = [];
            state.domains[dIdx].kpis[kIdx].tasks.push({ text, done: false }); 
            save(); 
        }
    };

    window.toggleTask = (dIdx, kIdx, tIdx) => {
        state.domains[dIdx].kpis[kIdx].tasks[tIdx].done = !state.domains[dIdx].kpis[kIdx].tasks[tIdx].done;
        save();
    };

    window.deleteTask = (dIdx, kIdx, tIdx) => {
        if(confirm("حذف هذه الخطة؟")) { state.domains[dIdx].kpis[kIdx].tasks.splice(tIdx, 1); save(); }
    };

    // --- وظيفة البحث والرسم ---
    function render() {
        const container = document.getElementById('app');
        const query = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = '';

        state.domains.forEach((dom, dIdx) => {
            if (!dom.title.toLowerCase().includes(query) && !JSON.stringify(dom.kpis).toLowerCase().includes(query)) return;

            let domHtml = `
                <div class="domain-card">
                    <h2 style="margin-top:0; color:var(--primary)">${dom.title}</h2>
                    <button class="btn btn-main" onclick="addKPI(${dIdx})">+ إضافة مؤشر</button>
                    <div class="kpis-list">
            `;

            dom.kpis.forEach((kpi, kIdx) => {
                const tasks = kpi.tasks || [];
                const doneCount = tasks.filter(t => t.done).length;
                const perc = tasks.length ? Math.round((doneCount/tasks.length)*100) : 0;

                domHtml += `
                    <div class="kpi-row">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <h4 style="margin:0">${kpi.name}</h4>
                            <span style="font-weight:900; color:var(--primary)">${perc}%</span>
                        </div>
                        <div style="background:#e2e8f0; height:8px; border-radius:10px; margin:10px 0">
                            <div style="width:${perc}%; background:var(--success); height:100%; border-radius:10px; transition:0.5s"></div>
                        </div>
                        <div class="tasks-area">
                            ${tasks.map((t, tIdx) => `
                                <div class="task-item">
                                    <div class="task-text ${t.done?'completed':''}" onclick="toggleTask(${dIdx}, ${kIdx}, ${tIdx})">
                                        <i class="${t.done?'fas fa-check-square':'far fa-square'}"></i> ${t.text}
                                    </div>
                                    <div class="action-btns">
                                        <i class="fas fa-trash-alt" onclick="deleteTask(${dIdx}, ${kIdx}, ${tIdx})"></i>
                                    </div>
                                </div>
                            `).join('')}
                            <div style="margin-top:10px; color:var(--primary); cursor:pointer; font-weight:700" onclick="addTask(${dIdx}, ${kIdx})">+ إضافة خطة عمل</div>
                        </div>
                    </div>
                `;
            });

            domHtml += `</div></div>`;
            container.innerHTML += domHtml;
        });
    }

    function updateCharts() {
        let total = 0, done = 0, kpiCount = 0;
        state.domains.forEach(d => d.kpis.forEach(k => {
            kpiCount++;
            const t = k.tasks || [];
            if (t.length && t.every(x => x.done)) done++;
            const dCount = t.filter(x => x.done).length;
            total += t.length ? (dCount/t.length)*100 : 0;
        }));

        const finalPerc = kpiCount ? Math.round(total/kpiCount) : 0;

        // تحديث الصناديق
        document.getElementById('statsBoxes').innerHTML = `
            <div style="background:#dcfce7; padding:15px; border-radius:15px"><h3>${kpiCount}</h3><small>إجمالي المؤشرات</small></div>
            <div style="background:#fef9c3; padding:15px; border-radius:15px"><h3>${finalPerc}%</h3><small>نسبة الإنجاز</small></div>
            <div style="background:#fee2e2; padding:15px; border-radius:15px"><h3>${done}</h3><small>مؤشرات مكتملة</small></div>
        `;

        // تحديث الرسم البياني
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['منجز', 'متبقي'],
                datasets: [{
                    data: [finalPerc, 100 - finalPerc],
                    backgroundColor: ['#059669', '#e2e8f0'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%' }
        });
    }
</script>
</body>
</html>
